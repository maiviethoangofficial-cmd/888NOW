<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>888NOW | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #1a0b1a 0%, #000 100%); font-family: 'Orbitron', sans-serif; color: #fff; }
        .neon-border { border: 2px solid #ff007f; box-shadow: 0 0 15px #ff007f; }
        .gold-text { color: #ffd700; text-shadow: 0 0 5px #ffd700; }
        .btn-cyber { background: linear-gradient(45deg, #ff007f, #ffd700); transition: 0.3s; cursor: pointer; }
        .btn-cyber:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff007f; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between border-b border-pink-500 pb-4 mb-8">
            <h1 class="text-2xl font-bold gold-text uppercase">888NOW ADMIN</h1>
            <div class="text-green-500 text-sm">● LIVE SYNC</div>
        </header>
        <div class="bg-black bg-opacity-50 p-6 rounded-lg neon-border">
            <h2 class="text-xl mb-4 gold-text italic">Update Database</h2>
            <input type="text" id="dataKey" placeholder="ID / Tên mục" class="w-full bg-gray-900 border border-pink-900 p-3 mb-4 rounded outline-none focus:border-pink-500">
            <textarea id="dataValue" placeholder="Nội dung dữ liệu..." class="w-full bg-gray-900 border border-pink-900 p-3 mb-4 rounded h-32 outline-none focus:border-pink-500"></textarea>
            <button onclick="saveData()" class="w-full btn-cyber py-3 rounded font-bold uppercase">Push to Firebase</button>
        </div>
        <div id="dataList" class="mt-8 space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // VUI LÒNG THAY THÔNG SỐ CỦA BẠN VÀO ĐÂY
        const firebaseConfig = {
            databaseURL: "https://hpok-d355c.firebaseio.com",
            projectId: "hpok-d355c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveData = function() {
            const key = document.getElementById('dataKey').value;
            const val = document.getElementById('dataValue').value;
            if(key && val) {
                set(ref(db, 'admin_content/' + key), { content: val, time: new Date().toLocaleString() })
                .then(() => alert('Đã đồng bộ!'));
            }
        };
    </script>
</body>
</html>
