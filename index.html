<style>
html,body{min-height:100%;margin:0;padding:0;overflow-x:hidden;font-family:Arial,sans-serif;color:#fff;background:#0b0b0b;}
header{background:#000;padding:5px 15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:999;border-bottom:1px solid #2d1d23;}
.logo{font-size:26px;font-weight:900;background:linear-gradient(180deg,#ff9bb5,#ff2d55);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 10px rgba(255,45,85,0.6);}
.btn-app{background:linear-gradient(180deg,#ff85a2,#ff2d55);padding:6px 14px;border-radius:20px;font-size:11px;font-weight:800;text-decoration:none;color:#fff;box-shadow:0 0 10px #ff2d55;}
.auth-btns a{margin-left:6px;background:#ff2d55;padding:6px 10px;border-radius:6px;color:#fff;text-decoration:none;font-size:12px;}
.slider-container{width:100%;overflow:hidden;}
.slide img{width:100%;}
.news{background:#1b1b1b;padding:10px;white-space:nowrap;}
.news span{animation:runnews 14s linear infinite;color:#ff5ec4;}
@keyframes runnews{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

.wallet{margin:10px;padding:18px;border-radius:16px;background:linear-gradient(145deg,#ff3ca6,#ff0080);box-shadow:0 0 20px #ff0080 inset;}
.wallet-top{display:flex;justify-content:space-between;}
.balance-number{font-size:26px;font-weight:bold;}

.games{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:8px;margin-bottom:60px;}
.game{border-radius:18px;overflow:hidden;cursor:pointer;}
.game img{width:100%;}

.game-frame{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;background:#000;z-index:999;}
.game-frame iframe{width:100%;height:100%;}
.backBtn{position:absolute;top:10px;left:10px;background:#ff0080;border:none;padding:8px;color:#fff;font-weight:bold;}

.bottom{position:fixed;bottom:0;width:100%;height:50px;background:#111;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #333;}
.bottom a{color:#ff5ec4;text-decoration:none;font-size:12px;text-align:center;}
.bottom span{display:block;font-size:22px;}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get, push } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBD27MY...",
  databaseURL: "https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LOGIN */
let username = localStorage.getItem("username");

if(username){
document.getElementById("authBox").innerHTML = `
<span style="color:#0f0">${username}</span>
<a href="#" onclick="logout()">Thoát</a>`;
}

let balance = 0;

if(username){
const userRef = ref(db,"users/"+username);

get(userRef).then(s=>{
if(s.exists()){
balance=s.val().balance || 500000;
}else{
balance=500000;
set(userRef,{balance:balance});
}
updateBalance();
});
}

function updateBalance(){
document.getElementById("username").innerText=username||"Chưa đăng nhập";
document.getElementById("balance").innerText=Number(balance).toLocaleString()+" VNĐ";
if(username){
set(ref(db,"users/"+username+"/balance"),balance);
}
}

/* GAME */
window.openGame=function(url){

if(!username){
alert("Vui lòng đăng nhập");
location.href="login.html";
return;
}

if(balance<100000){
alert("Không đủ số dư");
return;
}

balance-=100000;
updateBalance();

document.getElementById("gameFrame").style.display="block";
document.getElementById("iframeGame").src=url;

setTimeout(()=>{
let chance=Math.random();

if(chance<=0.6){
let win=Math.floor(Math.random()*200000);
balance+=win;
alert("Bạn thắng "+win+" VNĐ");
saveHistory(url,"Thắng "+win);
}else{
alert("Thua");
saveHistory(url,"Thua");
}

updateBalance();

},10000);
}

window.closeGame=function(){
document.getElementById("gameFrame").style.display="none";
document.getElementById("iframeGame").src="";
}

function saveHistory(game,result){
push(ref(db,"users/"+username+"/history"),{
game:game,
result:result,
time:new Date().toLocaleString()
});
}

window.logout=function(){
localStorage.removeItem("username");
location.reload();
}

window.toggleMore = function(){
  var box = document.getElementById("walletMore");
  if(box.style.display === "grid"){
    box.style.display = "none";
  }else{
    box.style.display = "grid";
  }
}
</script>
