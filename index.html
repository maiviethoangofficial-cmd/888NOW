<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}

/* HEADER */
header{
background:#000;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #333;
}
.logo{
font-size:24px;
font-weight:bold;
background:linear-gradient(#ff9bb5,#ff2d55);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.auth a{
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
text-decoration:none;
color:#fff;
margin-left:5px;
}
.login{background:#333}
.register{background:linear-gradient(#ff85a2,#ff2d55)}

/* BANNER */
.banner{overflow:hidden}
.banner-track{display:flex;animation:slide 12s linear infinite}
.banner img{width:100%}
@keyframes slide{0%{transform:translateX(0)}100%{transform:translateX(-200%)}}

/* NEWS RUN */
.news{
width:100%;
overflow:hidden;
background:#1b1b1b;
padding:8px 0;
}
.news span{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:chaychu 15s linear infinite;
color:#ff5ec4;
}
@keyframes chaychu{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* WALLET */
.wallet{
margin:10px;
padding:15px;
border-radius:15px;
background:linear-gradient(145deg,#ff3ca6,#ff0080);
}
.wallet-top{display:flex;justify-content:space-between}
.balance-number{font-size:24px;font-weight:bold}

/* ACTION */
.wallet-actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:10px;
}
.wallet-item{
background:#111;
padding:8px;
border-radius:10px;
text-align:center;
color:#fff;
text-decoration:none;
}
.wallet-item:hover{background:#ff2d55}

/* MORE */
.wallet-more{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
margin-top:10px;
}

/* GAME */
.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.game img{width:100%;border-radius:12px}

/* FRAME */
.game-frame{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
z-index:999;
}
iframe{width:100%;height:100%;border:none}
.backBtn{
position:absolute;
top:10px;
left:10px;
background:#ff2d55;
border:none;
padding:8px;
color:#fff;
border-radius:8px;
}

/* MENU */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#0f0f0f;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #222;
z-index:999;
}
.bottom a{
color:#aaa;
text-decoration:none;
font-size:11px;
text-align:center;
}
.bottom a span{
display:block;
font-size:20px;
}
.bottom a:hover{
color:#ff2d55;
}
</style>
</head>

<script>
let username = localStorage.getItem("username") || "Khách";
document.getElementById("username").innerText=username;

let balance = localStorage.getItem("balance") || 500000;
updateBalance();

function updateBalance(){
document.getElementById("balance").innerText=
Number(balance).toLocaleString()+" VNĐ";
}

function openGame(url){
document.getElementById("gameFrame").style.display="block";
document.getElementById("iframeGame").src=url;
}

function closeGame(){
document.getElementById("gameFrame").style.display="none";
document.getElementById("iframeGame").src="";
}
</script>
