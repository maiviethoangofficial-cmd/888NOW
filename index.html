/* ===== CẤU HÌNH CHUNG ===== */
body {
    margin: 0;

    background: #0b0b0b;
    color: #fff;
    -webkit-tap-highlight-color: transparent;

/* ===== HEADER ===== */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.menu-btn { font-size: 20px; color: #ff2d55; cursor: pointer; }

.logo {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(90deg, #ff2d55, #fff, #ff2d55);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}
@keyframes shine { 0%{background-position:-200%} 100%{background-position:200%} }

.btn-app {
    background: linear-gradient(145deg, #ff2d55, #ff6a88);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
    text-decoration: none;
    box-shadow: 0 0 10px rgba(255, 45, 85, 0.5);
}

/* ===== THANH AUTH (VÁT CHÉO GIỐNG HÌNH) ===== */
.auth-bar {
    margin: 15px 10px;
    position: relative;
    height: 50px;
}

.auth-box {
    display: flex;
    width: 100%;
    height: 100%;
    border-radius: 8px;
    overflow: hidden;
}

.auth-left {
    flex: 1.2;
    background: linear-gradient(to right, #f44336, #ff5722);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 16px;
    clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); /* Tạo vát chéo */
    z-index: 2;
}

.auth-right {
    flex: 1;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 16px;
    margin-left: -20px; /* Ghép đè phần vát */
    padding-left: 20px;
}

.auth-bonus {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff9800;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: bold;
    border: 1px solid #fff;
    z-index: 3;
}

/* ===== BANNER SLIDER ===== */
.slider { overflow: hidden; position: relative; width: 100%; }
.slides { display: flex; transition: 0.5s; }
.slides img { width: 100%; display: block; }
.dots { text-align: center; position: absolute; bottom: 8px; width: 100%; }
.dot { height: 6px; width: 6px; background: #fff; margin: 0 3px; border-radius: 50%; display: inline-block; opacity: 0.4; }
.dot.active { opacity: 1; background: #ff2d55; width: 15px; border-radius: 5px; }

/* ===== TIN TỨC ===== */
.news { background: #1a1a1a; padding: 10px; display: flex; align-items: center; font-size: 12px; color: #ffca28; border-bottom: 1px solid #333; }
.news i { margin-right: 8px; }
.news-scroll { overflow: hidden; white-space: nowrap; }
.news-scroll span { display: inline-block; animation: run 15s linear infinite; }
@keyframes run { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

/* ===== MENU TAB HOT (NỀN TRẮNG GIỐNG HÌNH) ===== */
.menu-tab {
    display: flex;
    justify-content: space-around;
    padding: 15px 10px;
    background: #0b0b0b;
}

.menu-item {
    background: #fff;
    padding: 12px 5px;
    border-radius: 12px;
    width: 22%;
    text-align: center;
    color: #333;
    font-size: 11px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.menu-item i {
    font-size: 24px;
    margin-bottom: 6px;
    display: block;
    color: #222;
}

/* ===== DANH SÁCH GAME ===== */
.games {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 10px;
    margin-bottom: 90px;
}

.game { position: relative; border-radius: 15px; overflow: hidden; }
.game img { width: 100%; height: auto; display: block; border: 1px solid #333; }

/* ===== TAB DƯỚI (BOTTOM BAR) ===== */
.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #151515;
    display: flex;
    justify-content: space-around;
    padding: 8px 0;
    border-top: 1px solid #222;
    z-index: 1001;
}

.bottom a {
    text-decoration: none;
    color: #888;
    font-size: 10px;

    align-items: center;
}

.bottom i {

    margin-bottom: 4px;
}

.bottom a.active {

}

/* NÚT HOME GIỮA CÓ THỂ LÀM NỔI BẬT */
.bottom a.active i {
    filter: drop-shadow(0 0 5px #f44336);
}

</style>

<script>
/* SCRIPT CHO SLIDER */
let index = 0;
const slides = document.getElementById("slides");
const dotsContainer = document.getElementById("dots");
const totalSlides = 3;

for (let i = 0; i < totalSlides; i++) {
    const span = document.createElement("span");
    span.classList.add("dot");
    if (i === 0) span.classList.add("active");
    dotsContainer.appendChild(span);
}

const dots = document.getElementsByClassName("dot");

function runSlide() {
    slides.style.transform = `translateX(-${index * 100}%)`;
    for (let i = 0; i < dots.length; i++) {
        dots[i].classList.remove("active");
    }
    dots[index].classList.add("active");
    index = (index + 1) % totalSlides;
}

setInterval(runSlide, 3500);

/* HIỆU ỨNG CHUYỂN TAB DƯỚI */
const tabs = document.querySelectorAll('.bottom a');
tabs.forEach(tab => {
    tab.addEventListener('click', function() {
        tabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
    });
});
</script>
