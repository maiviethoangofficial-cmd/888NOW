<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HPOK OFFICIAL</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:10px;background:#111;position:sticky;top:0;z-index:999;
}

.menu a{color:#ff7b00;font-size:22px}
.logo{font-size:20px;font-weight:bold}
.download{
background:#ff3c00;padding:6px 12px;border-radius:20px;
font-size:12px;text-decoration:none;color:#fff;
box-shadow:0 0 10px #ff3c00;
}

/* SLIDER */
.slider{
position:relative;overflow:hidden;
}
.slides{
display:flex;transition:0.5s;
}
.slides img{width:100%}

.dots{
position:absolute;bottom:10px;width:100%;text-align:center;
}
.dots span{
display:inline-block;width:8px;height:8px;border-radius:50%;
background:#fff;margin:0 3px;opacity:.4;cursor:pointer;
}
.dots .active{opacity:1;background:#ff3c00}

/* LOGIN BAR */
.auth-bar{
margin:10px;background:#222;border-radius:30px;
display:flex;overflow:hidden;
}
.auth-bar a{
flex:1;text-align:center;padding:12px;
font-weight:bold;text-decoration:none;
transition:0.2s;
}
.auth-bar a:active{transform:scale(0.95)}
.register{background:#ff3c00}
.login{background:#333}

/* MARQUEE */
.marquee{
background:#1a1a1a;padding:6px;overflow:hidden;
white-space:nowrap;
}
.marquee span{
display:inline-block;animation:run 10s linear infinite;color:#ffb400;
}
@keyframes run{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* WALLET */
.wallet{
margin:10px;
background:linear-gradient(45deg,#ff3c00,#ff0080);
padding:15px;border-radius:12px;
display:flex;justify-content:space-between;
}

/* GAME */
.games{
display:grid;grid-template-columns:repeat(2,1fr);
gap:10px;padding:10px;margin-bottom:70px;
}
.game img{
width:100%;border-radius:12px;
transition:0.2s;
}
.game:active img{transform:scale(0.95)}

/* FRAME */
.game-frame{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;z-index:999;
}
.backBtn{
position:absolute;top:10px;left:10px;
background:#ff3c00;color:#fff;border:none;padding:6px;
}
.game-frame iframe{width:100%;height:100%}

/* BOTTOM */
.bottom{
position:fixed;bottom:0;width:100%;
background:#111;display:flex;justify-content:space-around;
padding:6px 0;border-top:1px solid #333;
}
.bottom a{
color:#aaa;text-decoration:none;font-size:11px;text-align:center;
}
.bottom a.active{color:#ff3c00}
.bottom i{display:block;font-size:20px}

/* POPUP */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:flex;justify-content:center;align-items:center;
z-index:1000;
}
.popup-box{
background:#222;padding:20px;border-radius:12px;
text-align:center;
}
.popup button{
margin-top:10px;padding:8px 15px;
background:#ff3c00;border:none;color:#fff;
}
</style>
</head>

<body>

<script>
let index=0;
let slides=document.getElementById("slides");
let dots=document.querySelectorAll(".dots span");

function showSlide(i){
index=i;
slides.style.transform="translateX(-"+i*100+"%)";
dots.forEach(d=>d.classList.remove("active"));
dots[i].classList.add("active");
}

function goSlide(i){showSlide(i)}

setInterval(()=>{
index=(index+1)%3;
showSlide(index);
},3000);

showSlide(0);

/* USER */
let username=localStorage.getItem("username")||"Khách";
document.getElementById("username").innerText=username;
document.getElementById("balance").innerText="500000 VNĐ";

/* GAME */
function openGame(url){
document.getElementById("gameFrame").style.display="block";
document.getElementById("iframeGame").src=url;
}
function closeGame(){
document.getElementById("gameFrame").style.display="none";
}

/* POPUP */
function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>
