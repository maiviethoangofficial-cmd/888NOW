<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

/* ===== HEADER ===== */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#000;
position:sticky;
top:0;
z-index:999;
}

/* MENU */
.menu-btn{
font-size:24px;
color:#ff2d55;
cursor:pointer;
transition:0.3s;
}
.menu-btn:hover{
transform:rotate(90deg) scale(1.2);
}

/* LOGO VIP */
.logo{
font-size:24px;
font-weight:900;
background:linear-gradient(90deg,#ff2d55,#fff,#ff2d55);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{
0%{background-position:-200%}
100%{background-position:200%}
}

/* APP */
.btn-app{
background:linear-gradient(145deg,#ff2d55,#ff6a88);
padding:8px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:#fff;
text-decoration:none;
box-shadow:0 0 10px #ff2d55;
}

/* ===== AUTH ===== */
.auth-bar{margin:10px;position:relative;}
.auth-box{
display:flex;
background:#222;
border-radius:40px;
overflow:hidden;
}
.auth-left{
flex:1;
text-align:center;
padding:14px;
background:linear-gradient(90deg,#ff2d55,#ff6a88);
font-weight:bold;
}
.auth-right{
flex:1;
text-align:center;
padding:14px;
background:#444;
}
.auth-bonus{
position:absolute;
top:-10px;
left:50%;
transform:translateX(-50%);
background:#ff2d55;
padding:5px 12px;
border-radius:12px;
font-size:12px;
}

/* ===== SLIDER ===== */
.slider{overflow:hidden;position:relative;}
.slides{display:flex;transition:0.5s;}
.slides img{width:100%;}
.dots{text-align:center;position:absolute;bottom:10px;width:100%;}
.dot{height:8px;width:8px;background:#fff;margin:3px;border-radius:50%;opacity:0.4;}
.active{opacity:1;background:#ff2d55;}

/* ===== NEWS ===== */
.news{background:#1b1b1b;padding:8px;overflow:hidden;}
.news span{display:inline-block;white-space:nowrap;animation:run 12s linear infinite;color:#ff5ec4;}
@keyframes run{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* ===== MENU TAB ===== */
.menu-tab{
display:flex;
justify-content:space-around;
padding:10px;
}
.menu-item{
background:#1a1a1a;
padding:10px;
border-radius:12px;
width:22%;
text-align:center;
}
.menu-item i{
color:#ff2d55;
font-size:20px;
}

/* ===== GAME ===== */
.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
margin-bottom:80px;
}
.game img{
width:100%;
border-radius:15px;
}

/* ===== TAB DƯỚI CANVA ===== */
.bottom{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(180deg,#111,#000);
display:flex;
justify-content:space-around;
padding:8px 0;
border-top:1px solid #333;
}

.bottom a{
text-decoration:none;
color:#aaa;
font-size:11px;
text-align:center;
flex:1;
}

.bottom img{
width:26px;
height:26px;
margin-bottom:3px;
filter:drop-shadow(0 2px 5px #000);
transition:0.3s;
}

.bottom a.active{
color:#ff2d55;
}

.bottom a.active img{
transform:scale(1.2);
filter:drop-shadow(0 0 8px #ff2d55);
}

</style>

<script>

/* MENU */
function openMenu(){
window.location.href="menu.html";
}

/* SLIDER */
let index=0;
let slides=document.getElementById("slides");
let dots=document.getElementById("dots");

for(let i=0;i<3;i++){
dots.innerHTML+=`<span class="dot"></span>`;
}

let dot=document.getElementsByClassName("dot");

function runSlide(){
slides.style.transform="translateX(-"+index*100+"%)";

for(let i=0;i<dot.length;i++){
dot[i].classList.remove("active");
}

dot[index].classList.add("active");

index++;
if(index>=3) index=0;
}

setInterval(runSlide,3000);
runSlide();

</script>
