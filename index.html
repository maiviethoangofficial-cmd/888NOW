/* HEADER */
header{

position:sticky;

z-index:999;
}

.logo{

font-weight:bold;

}

/* MENU */
.menu-box{
position:absolute;
top:55px;
left:10px;
background:#111;
border-radius:10px;
display:none;
flex-direction:column;
padding:10px;
z-index:999;
}

.menu-box a{
color:#fff;
padding:10px;
text-decoration:none;
border-bottom:1px solid #333;
}

.menu-box a:hover{
background:#ff2d55;
}

/* AUTH */

background:#ff2d55;
padding:6px 10px;
border-radius:6px;
color:#fff;
text-decoration:none;
margin-left:5px;
font-size:12px;
}

/* SLIDER */
.slider{
overflow:hidden;
}

.slides{
display:flex;
transition:0.5s;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
}

/* DOT */
.dots{
text-align:center;
margin:5px;
}

.dot{
height:8px;
width:8px;
background:#555;
display:inline-block;
border-radius:50%;
margin:3px;
}

.active{
background:#ff2d55;
}

/* NEWS */
.news{
background:#1b1b1b;
overflow:hidden;
white-space:nowrap;
}

.news span{
display:inline-block;
padding:10px;
animation:run 12s linear infinite;
}

@keyframes run{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* WALLET */
.wallet{
margin:10px;
padding:15px;
border-radius:12px;
background:linear-gradient(#ff3ca6,#ff0080);
}

.balance{
font-size:22px;
font-weight:bold;
}

.wallet-actions{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.wallet-item{
text-align:center;
font-size:12px;
color:#fff;
text-decoration:none;
}

.wallet-icon{
font-size:20px;
}

/* GAME */
.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
padding:8px;
margin-bottom:60px;
}

.game img{
width:100%;
border-radius:12px;
}

/* FRAME */
.game-frame{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:999;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:8px;
}

.bottom a{
color:#ff2d55;
text-decoration:none;
font-size:12px;
text-align:center;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=getDatabase(app);

let username=localStorage.getItem("username");

if(username){
document.getElementById("authBox").innerHTML=
username+' <a onclick="logout()">Thoát</a>';
}

let balance=0;

if(username){
get(ref(db,"users/"+username)).then(s=>{
balance=s.val()?.balance||500000;
update();
});
}

function update(){
document.getElementById("username").innerText=username||"Chưa login";
document.getElementById("balance").innerText=balance.toLocaleString()+" VNĐ";
if(username){
set(ref(db,"users/"+username+"/balance"),balance);
}
}

window.openGame=function(url){
if(!username){location.href="login.html";return;}
if(balance<100000){alert("Không đủ tiền");return;}

balance-=100000;
update();

document.getElementById("frame").style.display="block";
document.getElementById("game").src=url;

setTimeout(()=>{
if(Math.random()<0.6){
let win=Math.floor(Math.random()*200000);
balance+=win;
alert("Thắng "+win);
}
update();
},8000);
}

window.closeGame=function(){
document.getElementById("frame").style.display="none";
}

window.toggleMenu=function(){
let m=document.getElementById("menu");
m.style.display=(m.style.display=="flex")?"none":"flex";
}

window.logout=function(){
localStorage.removeItem("username");
location.reload();
}

/* SLIDER */
let i=0;
setInterval(()=>{
i=(i+1)%3;
document.getElementById("slides").style.transform=
"translateX(-"+i*100+"%)";

document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"));
document.querySelectorAll(".dot")[i].classList.add("active");

},3000);
</script>
