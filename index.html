<style>
html,body{min-height:100%;overflow-x:hidden;}
body{margin:0;padding:0;background:#0b0b0b;font-family:Arial,Helvetica,sans-serif;color:#fff;}
header{background:#000;padding:1px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2d1d23;position:sticky;top:0;z-index:999;}
.logo{font-size:26px;font-weight:900;background:linear-gradient(180deg,#ff9bb5,#ff2d55);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 10px rgba(255,45,85,0.6);}
.auth-bar{display:flex;gap:10px;padding:15px;position:relative;}
.btn-app{background:linear-gradient(180deg,#ff85a2,#ff2d55);padding:6px 14px;border-radius:20px;font-size:11px;font-weight:800;text-decoration:none;color:#fff;box-shadow:0 0 10px #ff2d55;}
.content{padding-top:65px;padding-bottom:120px;}
.slider-container{width:100%;overflow:hidden;position:relative;}
.slider-wrapper{display:flex;}
.slide{min-width:100%;}
.slide img{width:100%;height:auto;}
.news{background:#1b1b1b;padding:10px;overflow:hidden;white-space:nowrap;}
.news span{display:inline-block;animation:runnews 14s linear infinite;color:#ff5ec4;}
@keyframes runnews{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.wallet{margin:10px;padding:18px;border-radius:16px;background:linear-gradient(145deg,#ff3ca6,#ff0080);box-shadow:0 0 20px #ff0080 inset;}
.wallet-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.wallet-name{font-size:16px;font-weight:bold;}
.wallet-id{font-size:12px;opacity:.8;}
.balance-label{font-size:12px;}
.balance-number{font-size:26px;font-weight:bold;}
.wallet-actions{display:flex;justify-content:space-between;}
.wallet-item{flex:1;text-align:center;font-size:12px;}
.wallet-icon{font-size:22px;margin-bottom:4px;}
.wallet-more{display:none;margin-top:14px;border-top:1px solid rgba(255,255,255,.3);padding-top:12px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.games{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:8px;margin-top:6px;margin-bottom:60px;}
.game{position:relative;background:#140b0e;border-radius:18px;overflow:hidden;border:none;}
.game:hover{transform:scale(1.05);box-shadow:0 0 20px #ff2d55;}
.game img{width:100%;display:block;}
.game span{display:block;padding:6px;text-align:center;font-size:12px;font-weight:700;}
.game::before{content:"";position:absolute;inset:0;border-radius:18px;padding:1px;background:linear-gradient(45deg,#ffd700,#ffb300,#ffd700);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:.4s;}
.game-frame{display:none;position:fixed;top:55px;left:0;width:100%;height:calc(100vh - 115px);background:#000;z-index:999;}
.game-frame iframe{width:100%;height:100%;border:none;}
.backBtn{position:absolute;top:10px;left:10px;background:#ff0080;border:none;padding:8px 14px;border-radius:8px;color:#fff;font-weight:bold;}
.bottom{position:fixed;bottom:0;left:0;right:0;height:50px;background:#111;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #333;}
.bottom a{text-decoration:none;color:#ff5ec4;font-size:12px;text-align:center;}
.bottom span{display:block;font-size:22px;}
</style>
</head>

<script>
// KHỞI TẠO NGƯỜI CHƠI
var username = localStorage.getItem("username")
if(!username){username = "Khách"+Math.floor(Math.random()*9999); localStorage.setItem("username",username);}
document.getElementById("username").innerText = username
// SỐ DƯ BAN ĐẦU
var balance = localStorage.getItem("balance")
if(balance==null){balance = 500000; localStorage.setItem("balance",balance);}
function updateBalance(){document.getElementById("balance").innerText = Number(balance).toLocaleString()+" VNĐ";}
updateBalance();
// TAB VÍ XEM THÊM
function toggleMoreWallet(){var tab=document.getElementById("walletMore"); tab.style.display=(tab.style.display=="grid")?"none":"grid";}
// NẠP TIỀN
function napTien(){var money=prompt("Nhập số tiền nạp");if(money){balance=Number(balance)+Number(money); localStorage.setItem("balance",balance); updateBalance(); alert("Nạp thành công");}}
// RÚT TIỀN
function rutTien(){var money=prompt("Nhập số tiền rút"); if(money>balance){alert("Không đủ số dư"); return;} balance=Number(balance)-Number(money); localStorage.setItem("balance",balance); updateBalance(); alert("Rút thành công");}
// LÌ XÌ MỖI NGÀY
function openBonus(){var today=new Date().toDateString(); var last=localStorage.getItem("bonusDay"); if(last==today){alert("Bạn đã nhận lì xì hôm nay"); return;} var bonus=[2000,5000,10000,20000]; var win=bonus[Math.floor(Math.random()*bonus.length)]; balance=Number(balance)+win; localStorage.setItem("balance",balance); localStorage.setItem("bonusDay",today); updateBalance(); alert("Bạn nhận được "+win+" VNĐ");}
// GAME
var gameSession=false, betCost=100000;
function openGame(url){if(balance<betCost){alert("Không đủ số dư để vào game"); return;} balance=Number(balance)-betCost; localStorage.setItem("balance",balance); updateBalance(); document.getElementById("gameFrame").style.display="block"; document.getElementById("iframeGame").src=url; gameSession=true; sessionStart();}
function closeGame(){document.getElementById("gameFrame").style.display="none"; document.getElementById("iframeGame").src=""; gameSession=false;}
function sessionStart(){setTimeout(function(){if(!gameSession) return; var chance=Math.random(); if(chance<=0.6){var win=Math.floor(Math.random()*200000); balance=Number(balance)+win; localStorage.setItem("balance",balance); updateBalance(); alert("Bạn thắng "+win+" VNĐ");} else{alert("Chúc bạn may mắn lần sau");}},10000);}
function saveHistory(game,result){var history=localStorage.getItem("history"); if(!history){history=[];}else{history=JSON.parse(history);} history.push({game:game,result:result,time:new Date().toLocaleString()}); localStorage.setItem("history",JSON.stringify(history));}
function checkVip(){var total=localStorage.getItem("tongnap"); if(!total) total=0; var vip="VIP0"; if(total>1000000) vip="VIP1"; if(total>5000000) vip="VIP2"; if(total>20000000) vip="VIP3"; if(total>100000000) vip="VIP4"; return vip;}
</script>
