<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;

}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#000;
border-bottom:1px solid #333;
}

.logo{
font-size:22px;
font-weight:900;
background:linear-gradient(#ff9bb5,#ff2d55);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.auth-btns a{
padding:6px 12px;
margin-left:5px;
border-radius:20px;
font-size:12px;
text-decoration:none;
color:#fff;
background:linear-gradient(#ff85a2,#ff2d55);
}

/* SLIDER */
.slider{
overflow:hidden;
}
.slider-track{
display:flex;
animation:slide 12s infinite;
}
.slide{min-width:100%;}
.slide img{width:100%;}

@keyframes slide{
0%{transform:translateX(0)}
33%{transform:translateX(-100%)}
66%{transform:translateX(-200%)}
100%{transform:translateX(0)}
}

/* NEWS */
.news{
background:#111;
overflow:hidden;
white-space:nowrap;
}
.news span{
display:inline-block;
padding-left:100%;
animation:run 10s linear infinite;
color:#ff5ec4;
}
@keyframes run{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* WALLET */
.wallet{
margin:10px;
padding:15px;
border-radius:15px;
background:linear-gradient(#ff3ca6,#ff0080);
box-shadow:0 0 20px #ff0080 inset;
}

.balance{
font-size:26px;
font-weight:bold;
}

/* ACTION */
.wallet-actions{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.wallet-item{
flex:1;
text-align:center;
font-size:12px;
color:#fff;
text-decoration:none;
}

.wallet-icon{
font-size:20px;
}

/* MORE */
.wallet-more{
margin-top:10px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

/* GAME */
.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
margin-bottom:60px;
}

.game{
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.game:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ff2d55;
}

.game img{
width:100%;
}

/* IFRAME */
.game-frame{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:999;
}

.game-frame iframe{
width:100%;
height:100%;
border:none;
}

/* BACK */
.backBtn{
position:absolute;
top:10px;
left:10px;
background:#ff0080;
border:none;
padding:8px 12px;
color:#fff;
border-radius:8px;
}

/* MENU */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:5px;
}

.bottom a{
color:#ff5ec4;
text-decoration:none;
font-size:12px;

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, get, push } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBD27MY...",
databaseURL:"https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

let username = localStorage.getItem("username") || "Khách";
document.getElementById("username").innerText=username;

let balance=500000;

get(ref(db,"users/"+username)).then(s=>{
if(s.exists()) balance=s.val().balance;
updateBalance();
});

function updateBalance(){
document.getElementById("balance").innerText=
Number(balance).toLocaleString()+" VNĐ";
set(ref(db,"users/"+username+"/balance"),balance);
}

window.openGame=function(url){
if(balance<100000){alert("Không đủ tiền");return;}
balance-=100000;
updateBalance();

document.getElementById("gameFrame").style.display="block";
document.getElementById("iframeGame").src=url;

setTimeout(()=>{
if(Math.random()<0.6){
let win=Math.floor(Math.random()*200000);
balance+=win;
updateBalance();
alert("Thắng "+win);
}
},8000);
}

window.closeGame=function(){
document.getElementById("gameFrame").style.display="none";
}
</script>
