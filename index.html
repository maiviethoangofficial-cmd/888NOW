@keyframes run { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

.auth-btn { flex: 1; height: 100%; border-radius: 30px; text-decoration: none; color: #fff; font-weight: 900; font-size: 16px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid transparent; }
.auth-register { background: linear-gradient(145deg, #ff1a1a, #800000); border-color: #ff4d4d; }
.auth-login { background: linear-gradient(145deg, #ffd700, #b8860b); color: #333; border-color: #fff; }
.auth-bonus { position: absolute; top: -15px; left: 15px; background: #ff9800; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: 1px solid #fff; z-index: 3; }

/* ===== MENU TAB HOT ===== */
.menu-tab { display: flex; justify-content: space-around; padding: 15px 10px; }
.menu-item { background: linear-gradient(180deg, #ffffff 0%, #f2f2f2 100%); padding: 12px 0; border-radius: 15px; width: 22%; text-align: center; color: #333; font-size: 10px; font-weight: 800; box-shadow: 0 5px 12px rgba(0,0,0,0.4); border: 1px solid #d4af37; display: flex; flex-direction: column; align-items: center; }

/* ===== GAMES & HOT TAG ===== */
.games { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px; margin-bottom: 90px; }

/* Nhãn HOT Động */

/* ===== TAB DƯỚI ===== */

<script>
/* SCRIPT SLIDER */
let currentIndex = 0;
const slides = document.getElementById('slides');
const dotsContainer = document.getElementById('dots');
const totalSlides = slides.children.length;

for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('div');
    dot.classList.add('dot');
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => { currentIndex = i; updateSlider(); });
    dotsContainer.appendChild(dot);
}

function updateSlider() {
    slides.style.transform = `translateX(-${currentIndex * 100}%)`;
    const allDots = document.querySelectorAll('.dot');
    allDots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
}

setInterval(() => {
    currentIndex = (currentIndex + 1) % totalSlides;
    updateSlider();
}, 4000);
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBD27MYenkjWOEjqj0hCisbh_61F_6bhSE",
  authDomain: "hpok-d355c.firebaseapp.com",
  databaseURL: "https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hpok-d355c",
  storageBucket: "hpok-d355c.appspot.com",
  messagingSenderId: "147356449789",
  appId: "1:147356449789:web:60bf6c812d5887796bf794"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= USER ================= */
let username = localStorage.getItem("username");
if(!username){
  username = "Khách"+Math.floor(Math.random()*9999);
  localStorage.setItem("username",username);
}
document.getElementById("username").innerText=username;

let balance = 0;
const userRef = ref(db,"users/"+username);

/* ================= LOAD DATA ================= */
get(userRef).then(snapshot=>{
  if(snapshot.exists()){
    balance = snapshot.val().balance || 500000;
  }else{
    balance = 500000;
    set(userRef,{balance:balance});
  }
  updateBalance();
});

function updateBalance(){
  document.getElementById("balance").innerText =
  Number(balance).toLocaleString()+" VNĐ";

  set(ref(db,"users/"+username+"/balance"),balance);
}

/* ================= GAME ================= */
let gameSession=false;
let betCost=100000;

window.openGame = function(url){

  if(balance<betCost){
    alert("Không đủ số dư");
    return;
  }

  balance -= betCost;
  updateBalance();

  document.getElementById("gameFrame").style.display="block";
  document.getElementById("iframeGame").src=url;

  gameSession=true;
  sessionStart(url);
  saveHistory(url,"Vào game");
}

window.closeGame = function(){
  document.getElementById("gameFrame").style.display="none";
  document.getElementById("iframeGame").src="";
  gameSession=false;
}

/* ================= RTP ================= */
function sessionStart(game){
  setTimeout(function(){
    if(!gameSession) return;

    let chance=Math.random();

    if(chance<=0.6){
      let win=Math.floor(Math.random()*200000);
      balance += win;
      updateBalance();
      alert("Bạn thắng "+win+" VNĐ");
      saveHistory(game,"Thắng "+win+" VNĐ");
    }else{
      alert("Chúc bạn may mắn lần sau");
      saveHistory(game,"Thua");
    }

  },10000);
}

/* ================= HISTORY ================= */
function saveHistory(game,result){
  push(ref(db,"users/"+username+"/history"),{
    game:game,
    result:result,
    time:new Date().toLocaleString()
  });
}
</script>
