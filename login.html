<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Login HPOK</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBD27MYenkjWOEjqj0hCisbh_61F_6bhSE",
authDomain: "hpok-d355c.firebaseapp.com",
projectId: "hpok-d355c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

signInWithEmailAndPassword(auth,email,pass)
.then(user=>{
localStorage.setItem("uid",user.user.uid);
location.href="home.html";
})
.catch(()=>alert("Sai tài khoản"));
}
</script>

<style>
body{background:#0b0b0b;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:#111;padding:25px;border-radius:20px;box-shadow:0 0 20px #ff2d55;width:90%;max-width:350px;}
input{width:100%;padding:12px;margin-bottom:10px;border:none;border-radius:10px;background:#1b1b1b;color:#fff;}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#ff2d55;color:#fff;}
</style>
</head>

<body>

<div class="box">
<h2>Đăng nhập</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Mật khẩu">
<button onclick="login()">Đăng nhập</button>
</div>

</body>
</html>
