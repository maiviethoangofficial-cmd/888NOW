<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
    <title>HPOK - ĐĂNG NHẬP CỔNG VIP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" rel="stylesheet">
    <style>
        :root { --pink: #ff2d55; --gold: linear-gradient(135deg, #ffe1a8, #d4af37); --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; font-family: 'Lexend', sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        /* Hiệu ứng Pháo hoa nhỏ nền */
        .stars-container { position: fixed; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 110%, #4a152b 0%, #050505 100%); }

        .container { width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }
        
        .header-box { text-align: center; margin: 50px 0 30px; animation: fadeInDown 1s both; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        .logo-login { font-size: 70px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: -4px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }

        .auth-card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 35px 30px; position: relative; }
        .auth-card::after { content: ""; position: absolute; inset: -1px; border-radius: 40px; padding: 1px; background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; }

        .tabs { display: flex; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 5px; margin-bottom: 30px; }
        .tab { flex: 1; text-align: center; padding: 14px; border-radius: 16px; font-weight: 800; color: #555; text-decoration: none; }
        .tab.active { background: var(--gold); color: #000; }

        .field { margin-bottom: 20px; }
        .field-label { display: block; font-size: 11px; font-weight: 800; color: #666; margin-left: 15px; margin-bottom: 10px; letter-spacing: 2px; }
        .input-box { background: rgba(0,0,0,0.5); border: 1.5px solid #222; border-radius: 20px; display: flex; align-items: center; padding: 0 18px; }
        .input-box i { color: var(--pink); font-size: 18px; width: 30px; }
        .input-box input { background: none; border: none; padding: 18px 5px; color: #fff; width: 100%; outline: none; font-size: 16px; }

        .options-row { display: flex; justify-content: space-between; align-items: center; padding: 0 5px 25px; font-size: 13px; color: #888; }
        .check-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .check-wrap input { accent-color: var(--pink); width: 18px; height: 18px; }

        .btn-login { width: 100%; padding: 20px; border-radius: 22px; border: none; background: var(--gold); color: #000; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .btn-login:hover { filter: brightness(1.1); }

        .support-links { margin-top: 35px; text-align: center; }
        .support-links a { display: block; color: #555; text-decoration: none; font-size: 13px; margin-bottom: 15px; font-weight: 600; transition: 0.3s; }
        .support-links a:hover { color: var(--pink); }

        .app-download { margin-top: auto; padding: 30px 0; text-align: center; }
        .app-title { font-size: 11px; color: #ff9eb5; font-weight: 800; letter-spacing: 3px; margin-bottom: 20px; }
        .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .badge-item { background: #111; border: 1px solid #333; border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
        .badge-item i { font-size: 24px; color: var(--pink); }
    </style>
</head>
<body>

    <div class="stars-container"></div>

    <div class="container">
        <div class="header-box">
            <h1 class="logo-login">HPOK</h1>
            <p style="color:#666; font-size:12px; font-weight:700; letter-spacing:4px;">ROYAL LOGIN</p>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <a href="register.html" class="tab">ĐĂNG KÝ</a>
                <a href="login.html" class="tab active">ĐĂNG NHẬP</a>
            </div>

            <div class="field">
                <span class="field-label">USERNAME</span>
                <div class="input-box"><i class="fa-solid fa-user-gear"></i><input type="text" id="logUser" placeholder="Tên tài khoản"></div>
            </div>

            <div class="field">
                <span class="field-label">PASSWORD</span>
                <div class="input-box"><i class="fa-solid fa-key-skeleton"></i><input type="password" id="logPass" placeholder="••••••••"></div>
            </div>

            <div class="options-row">
                <label class="check-wrap"><input type="checkbox" id="rem"> Ghi nhớ tôi</label>
                <a href="#" style="color:#ff2d55; text-decoration:none; font-weight:700;">Quên?</a>
            </div>

            <button class="btn-login" onclick="doLogin()">TRUY CẬP NGAY</button>
        </div>

        <div class="support-links">
            <a href="#"><i class="fa-solid fa-headset"></i> CSKH TRỰC TUYẾN 24/7</a>
            <a href="#"><i class="fa-brands fa-telegram"></i> KÊNH THÔNG BÁO HPOK</a>
        </div>

        <div class="app-download">
            <div class="app-title">DOWNLOAD APP HPOK</div>
            <div class="badge-grid">
                <a href="#" class="badge-item"><i class="fa-brands fa-apple"></i><div style="text-align:left;"><span style="font-size:8px;display:block;color:#666;">Bản cài</span><b>IOS</b></div></a>
                <a href="#" class="badge-item"><i class="fa-brands fa-android"></i><div style="text-align:left;"><span style="font-size:8px;display:block;color:#666;">Bản cài</span><b>ANDROID</b></div></a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBD27MYenkjWOEjqj0hCisbh_61F_6bhSE", authDomain: "hpok-d355c.firebaseapp.com", databaseURL: "https://hpok-d355c-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "hpok-d355c" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.onload = () => {
            if(localStorage.getItem('savedUser')) document.getElementById('logUser').value = localStorage.getItem('savedUser');
        };

        window.doLogin = async () => {
            const user = document.getElementById('logUser').value.trim();
            const pass = document.getElementById('logPass').value;
            const rem = document.getElementById('rem').checked;

            if(!user || !pass) return Toastify({ text: "Vui lòng nhập đủ tài khoản!", style: { background: "#ff2d55" } }).showToast();

            try {
                const snap = await get(ref(db, 'users/' + user));
                if(snap.exists() && snap.val().password === pass) {
                    Toastify({ text: "Chào mừng Quân Vương trở lại!", style: { background: "#00ff88", color: "#000" } }).showToast();
                    localStorage.setItem("username", user);
                    if(rem) localStorage.setItem('savedUser', user);
                    else localStorage.removeItem('savedUser');
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else {
                    Toastify({ text: "Thông tin không chính xác!", style: { background: "#ff2d55" } }).showToast();
                }
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
